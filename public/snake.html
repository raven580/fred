<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000; /* Main black background */
            color: #ffffff; /* White text color */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #111111; /* Slightly off-black for the container */
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        #gameCanvas {
            border: 2px solid #ffffff; /* White border */
            background-color: #222222; /* Darker grey for the canvas background */
            border-radius: 0.5rem;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .stats-item {
            text-align: center;
        }

        .stats-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cccccc; /* Off-white for labels */
        }

        .control-panel {
            margin-top: 1.5rem;
            text-align: center;
        }

        #restartButton {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            color: #000000; /* Black text */
            background-color: #ffffff; /* White button */
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        #restartButton:hover {
            background-color: #ff0000; /* Red on hover */
            color: #ffffff; /* White text on hover */
            transform: translateY(-2px);
        }
        
        #restartButton:active {
            transform: translateY(0);
        }

        #messageBox {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff0000; /* Red for the "Game Over" message */
            margin-bottom: 1rem;
            min-height: 1.5rem;
        }
    </style>
</head>
<body>

<div>
    <p>Use wasd or arrow keys to move.</p>
</div>

<div class="game-container">
    <div id="messageBox"></div>
    <canvas id="gameCanvas"></canvas>
    <div class="stats-container">
        <div class="stats-item">
            <div class="stats-label">Score</div>
            <div id="scoreValue">0</div>
        </div>
        <div class="stats-item">
            <div class="stats-label">Deaths</div>
            <div id="deathCountValue">0</div>
        </div>
    </div>
    <div class="control-panel">
        <button id="restartButton">Restart Game</button>
    </div>
</div>

<script>
    // Constants
    const CANVAS_SIZE = 400;
    const TILE_SIZE = 20;

    // Game state variables
    let gameCanvas, ctx, messageBox, scoreValue, deathCountValue, restartButton;
    let snake, fruit, direction, score, deathCount = 0, gameLoop, isGameOver, isGameRunning;

    // Initialize the game when the window loads
    window.onload = function() {
        console.log("Window loaded. Initializing game elements.");
        gameCanvas = document.getElementById('gameCanvas');
        ctx = gameCanvas.getContext('2d');
        messageBox = document.getElementById('messageBox');
        scoreValue = document.getElementById('scoreValue');
        deathCountValue = document.getElementById('deathCountValue');
        restartButton = document.getElementById('restartButton');

        // Set canvas dimensions
        gameCanvas.width = CANVAS_SIZE;
        gameCanvas.height = CANVAS_SIZE;

        // Add event listeners
        document.addEventListener('keydown', handleInput);
        restartButton.addEventListener('click', setupGame);

        // Start the game for the first time
        setupGame();
    };

    /**
     * Sets up the game state to its initial values.
     * This is used for the initial game start and for restarting.
     */
    function setupGame() {
        console.log("Game setup initiated.");
        if (gameLoop) {
            cancelAnimationFrame(gameLoop);
        }

        // Reset state
        isGameOver = false;
        isGameRunning = true;
        score = 0;
        direction = { x: TILE_SIZE, y: 0 };
        // The snake now starts with two segments to better show direction
        snake = [{ x: 10 * TILE_SIZE, y: 10 * TILE_SIZE }, { x: 9 * TILE_SIZE, y: 10 * TILE_SIZE }];

        // Clear UI elements
        messageBox.textContent = '';
        scoreValue.textContent = score;

        // Generate the first fruit
        generateFruit();

        // Start the game loop
        gameLoop = requestAnimationFrame(animate);
        console.log("Game started/restarted.");
    }

    /**
     * Generates a new fruit at a random, unoccupied location.
     */
    function generateFruit() {
        fruit = {
            x: Math.floor(Math.random() * (CANVAS_SIZE / TILE_SIZE)) * TILE_SIZE,
            y: Math.floor(Math.random() * (CANVAS_SIZE / TILE_SIZE)) * TILE_SIZE
        };

        // Check if the new fruit position overlaps with the snake
        for (let i = 0; i < snake.length; i++) {
            if (fruit.x === snake[i].x && fruit.y === snake[i].y) {
                // If it overlaps, generate a new one
                generateFruit();
                return;
            }
        }
        console.log("New fruit generated at:", fruit);
    }

    /**
     * The main game loop function.
     */
    let lastTime = 0;
    const gameSpeed = 1000 / 10; // 10 frames per second
    function animate(currentTime) {
        if (isGameOver) return;
        gameLoop = requestAnimationFrame(animate);

        const deltaTime = currentTime - lastTime;
        if (deltaTime > gameSpeed) {
            lastTime = currentTime - (deltaTime % gameSpeed);
            update();
            draw();
        }
    }

    /**
     * Updates the game state (snake movement, collisions, etc.).
     */
    function update() {
        if (!isGameRunning) return;

        // Create the new head of the snake
        const newHead = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
        snake.unshift(newHead);

        // Check for collisions
        if (checkCollision()) {
            handleGameOver();
            return;
        }

        // Check if snake ate the fruit
        if (snake[0].x === fruit.x && snake[0].y === fruit.y) {
            console.log("Fruit eaten!");
            score += 10;
            scoreValue.textContent = score;
            generateFruit();
        } else {
            // Remove the tail if no fruit was eaten
            snake.pop();
        }
    }

    /**
     * Renders the snake and fruit on the canvas.
     */
    function draw() {
        // Clear the canvas
        ctx.fillStyle = '#222222';
        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

        // Draw the snake
        ctx.fillStyle = '#ffffff'; // White snake
        ctx.strokeStyle = '#cccccc'; // Off-white border
        for (let i = 0; i < snake.length; i++) {
            ctx.fillRect(snake[i].x, snake[i].y, TILE_SIZE, TILE_SIZE);
            ctx.strokeRect(snake[i].x, snake[i].y, TILE_SIZE, TILE_SIZE);
        }

        // Draw the fruit
        ctx.fillStyle = '#ff0000'; // Red fruit
        ctx.fillRect(fruit.x, fruit.y, TILE_SIZE, TILE_SIZE);
    }

    /**
     * Checks for collisions with the walls or the snake's own body.
     * @returns {boolean} True if a collision occurred, false otherwise.
     */
    function checkCollision() {
        // Wall collision
        if (snake[0].x < 0 || snake[0].x >= CANVAS_SIZE || snake[0].y < 0 || snake[0].y >= CANVAS_SIZE) {
            return true;
        }
        
        // Self-collision (start check from the second segment)
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                console.log("Collision with self detected.");
                return true;
            }
        }
        return false;
    }

    /**
     * Handles the end of the game.
     */
    function handleGameOver() {
        console.log("Game Over!");
        // Check if the collision was with a wall
        if (snake[0].x < 0 || snake[0].x >= CANVAS_SIZE || snake[0].y < 0 || snake[0].y >= CANVAS_SIZE) {
            console.log("Collision with wall detected.");
        }
        isGameOver = true;
        isGameRunning = false;
        cancelAnimationFrame(gameLoop);
        messageBox.textContent = 'Game Over!';
        deathCount++;
        deathCountValue.textContent = deathCount;
    }


    /**
     * Handles keyboard input for snake direction.
     * @param {KeyboardEvent} e - The keyboard event object.
     */
    function handleInput(e) {
        if (!isGameRunning) return;

        const key = e.key.toLowerCase();
        let newDirection = { x: direction.x, y: direction.y };

        if ((key === 'arrowup' || key === 'w') && direction.y === 0) {
            newDirection = { x: 0, y: -TILE_SIZE };
        } else if ((key === 'arrowdown' || key === 's') && direction.y === 0) {
            newDirection = { x: 0, y: TILE_SIZE };
        } else if ((key === 'arrowleft' || key === 'a') && direction.x === 0) {
            newDirection = { x: -TILE_SIZE, y: 0 };
        } else if ((key === 'arrowright' || key === 'd') && direction.x === 0) {
            newDirection = { x: TILE_SIZE, y: 0 };
        }

        // Only update if the direction is different
        if (newDirection.x !== direction.x || newDirection.y !== direction.y) {
            direction = newDirection;
            console.log(`Direction changed to: ${e.key}`);
        }
    }
</script>

</body>
</html>
